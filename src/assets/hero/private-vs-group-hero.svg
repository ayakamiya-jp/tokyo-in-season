<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 700" width="1920" height="700" role="img" aria-labelledby="privateVsGroupHeroTitle">
  <title id="privateVsGroupHeroTitle">Two tea settings side by side: a single solitary chawan and cushion on the left for a private ceremony, and a row of three closer-together chawan and cushions on the right for a group ceremony</title>

  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf8f4" />
      <stop offset="100%" stop-color="#f0ece4" />
    </linearGradient>
  </defs>

  <rect width="1920" height="700" fill="url(#bgGrad2)" />

  <!-- tatami mat lines, receding perspective -->
  <g stroke="#736b61" stroke-opacity="0.14" stroke-width="2">
    <line x1="0" y1="560" x2="1920" y2="560" />
    <line x1="0" y1="610" x2="1920" y2="610" />
    <line x1="0" y1="660" x2="1920" y2="660" />
    <line x1="120" y1="560" x2="20" y2="700" />
    <line x1="440" y1="560" x2="380" y2="700" />
    <line x1="760" y1="560" x2="760" y2="700" />
    <line x1="1080" y1="560" x2="1140" y2="700" />
    <line x1="1400" y1="560" x2="1500" y2="700" />
    <line x1="1720" y1="560" x2="1860" y2="700" />
  </g>

  <!-- soft central divider suggesting a room partition -->
  <line x1="960" y1="70" x2="960" y2="600" stroke="#3d5a3e" stroke-opacity="0.15" stroke-width="4" stroke-dasharray="2 18" stroke-linecap="round" />

  <!-- reusable tea setting: cushion + low table + chawan + steam -->
  <defs>
    <g id="teaSetting">
      <!-- cushion -->
      <ellipse cx="0" cy="140" rx="70" ry="24" fill="#e8bfb8" />
      <ellipse cx="0" cy="140" rx="70" ry="24" fill="none" stroke="#b87068" stroke-opacity="0.4" stroke-width="3" />
      <!-- low table -->
      <rect x="-90" y="60" width="180" height="20" rx="5" fill="#1a1a1a" fill-opacity="0.75" />
      <line x1="-75" y1="80" x2="-85" y2="130" stroke="#1a1a1a" stroke-opacity="0.75" stroke-width="7" stroke-linecap="round" />
      <line x1="75" y1="80" x2="85" y2="130" stroke="#1a1a1a" stroke-opacity="0.75" stroke-width="7" stroke-linecap="round" />
      <!-- chawan bowl -->
      <path d="M -35 60 Q -35 24 0 24 Q 35 24 35 60 Z" fill="#faf8f4" stroke="#1a1a1a" stroke-opacity="0.7" stroke-width="3" />
      <ellipse cx="0" cy="60" rx="35" ry="7" fill="none" stroke="#1a1a1a" stroke-opacity="0.5" stroke-width="2.5" />
      <!-- steam -->
      <path d="M -12 18 Q -20 0 -8 -18" fill="none" stroke="#7a9e7e" stroke-width="3" stroke-linecap="round" opacity="0.6" />
      <path d="M 10 18 Q 18 -2 6 -20" fill="none" stroke="#7a9e7e" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    </g>
  </defs>

  <!-- private side: one solitary setting, generous space, gentle enclosing arc suggesting a private room -->
  <g transform="translate(430,300)">
    <path d="M -260 260 Q -260 -140 260 -140 Q 260 -140 260 260" fill="none" stroke="#3d5a3e" stroke-opacity="0.12" stroke-width="6" />
    <use href="#teaSetting" transform="scale(1.3)" />
  </g>

  <!-- group side: three settings closer together -->
  <g transform="translate(1330,340)">
    <use href="#teaSetting" transform="translate(-260,20) scale(0.85)" />
    <use href="#teaSetting" transform="translate(0,0) scale(0.85)" />
    <use href="#teaSetting" transform="translate(260,20) scale(0.85)" />
  </g>

  <!-- single seasonal branch accent, upper left -->
  <g transform="translate(90,80)" stroke="#3d5a3e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M0 0 C 36 18, 54 54, 46 108" />
    <circle cx="16" cy="16" r="6" fill="#e8bfb8" stroke="none" />
    <circle cx="38" cy="50" r="6" fill="#e8bfb8" stroke="none" />
    <circle cx="46" cy="90" r="6" fill="#e8bfb8" stroke="none" />
  </g>
</svg>
